name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Changelog consistency
        run: dart run tool/changelog_check.dart

      - name: README version consistency
        run: dart run tool/readme_version_check.dart

      - name: Format (fail if changed)
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Publish (dry-run)
        run: dart pub publish --dry-run
